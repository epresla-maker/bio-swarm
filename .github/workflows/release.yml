name: bio-swarm-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full tests
        run: pnpm test

      - name: Build workspace
        run: pnpm build

      - name: Package release artifacts
        run: |
          mkdir -p release-artifacts
          cp -R apps/orchestrator/dist release-artifacts/orchestrator-dist
          cp -R packages/edge-runtime/dist release-artifacts/edge-runtime-dist
          cp -R packages/shared/dist release-artifacts/shared-dist
          cp README.md release-artifacts/README.md
          cp infra/PRODUCT_VISION_HU.md release-artifacts/PRODUCT_VISION_HU.md

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bio-swarm-release-${{ github.ref_name }}
          path: release-artifacts
          if-no-files-found: error
